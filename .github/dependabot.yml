version: 2

multi-ecosystem-groups:
  all-updates:
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
      include: "scope"
    pull-request-branch-name:
      separator: "-"

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    patterns: ["*"]
    multi-ecosystem-group: "all-updates"
    groups:
      security-all:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    patterns: ["*"]
    multi-ecosystem-group: "all-updates"
    groups:
      security-all:
        applies-to: security-updates
        patterns: ["*"]
